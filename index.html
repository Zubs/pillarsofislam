    <!-- ── Performance: preconnect to critical third-party origins ── -->
    <!-- Fonts (highest priority — block rendering) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- APIs (non-blocking, but start DNS early) -->
    <link rel="dns-prefetch" href="https://api.metals.live">
    <link rel="dns-prefetch" href="https://api.frankfurter.app">
    <link rel="dns-prefetch" href="https://nominatim.openstreetmap.org">

    <!-- ── Fonts: only the weights we actually use ───────────────── -->
    <!-- Using display=swap so text is visible even before fonts load —
         this was a key contributor to the 4.7s render latency.
         We also only load the exact weights needed, not the full family. -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap"
          rel="stylesheet">

    <!-- ── Styles: tokens first so CSS vars are available immediately -->
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/ornament.css">

    <style>
        /* ── Critical above-the-fold CSS inlined to reduce render-blocking ──
           This paints the loading screen and body background instantly
           without waiting for any external stylesheet to load.            */

        body {
            background: #F7F3EC; /* --cream, duplicated here so it's instant */
            margin: 0;
            padding: 0;
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* Loading screen */
        #loading {
            position: fixed;
            inset: 0;
            background-color: #F7F3EC;
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%231B5C42' opacity='0.07'%3E%3Cpolygon points='40,4 76,22 76,58 40,76 4,58 4,22' stroke-width='1'/%3E%3Cpolygon points='40,14 66,28 66,52 40,66 14,52 14,28' stroke-width='.6'/%3E%3Cline x1='40' y1='4' x2='40' y2='76' stroke-width='.4'/%3E%3Cline x1='4' y1='22' x2='76' y2='58' stroke-width='.4'/%3E%3Cline x1='76' y1='22' x2='4' y2='58' stroke-width='.4'/%3E%3C/g%3E%3C/svg%3E");
            background-size: 80px 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity .4s ease .1s;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-inner {
            text-align: center;
            max-width: 280px;
            padding: 0 1.5rem;
        }

        .loading-ornament {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 1.25rem;
            animation: lFadeUp .5s ease .1s both;
        }

        .loading-ornament::before,
        .loading-ornament::after {
            content: '';
            height: 1px;
            width: 44px;
            background: linear-gradient(to right, transparent, #C4932A);
        }

        .loading-ornament::after {
            background: linear-gradient(to left, transparent, #C4932A);
        }

        .lo-gem {
            width: 7px;
            height: 7px;
            background: #C4932A;
            transform: rotate(45deg);
        }

        .loading-bismillah {
            font-size: 1.6rem;
            color: #1B5C42;
            direction: rtl;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            animation: lFadeUp .6s ease .2s both;
        }

        .loading-logo {
            width: 48px;
            height: 48px;
            background: #1B5C42;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto .75rem;
            animation: lFadeUp .5s ease .35s both;
        }

        .loading-name {
            font-size: 1.7rem;
            font-weight: 600;
            color: #1A1A18;
            letter-spacing: .3px;
            margin-bottom: .2rem;
            animation: lFadeUp .5s ease .45s both;
        }

        .loading-name span {
            color: #1B5C42;
        }

        .loading-sub {
            font-size: 11px;
            color: #6B6860;
            letter-spacing: .4px;
            animation: lFadeUp .5s ease .55s both;
        }

        @keyframes lFadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* App shell */
        #app {
            min-height: calc(100vh - 64px);
            opacity: 1;
            transition: opacity .15s ease;
        }

        /* Responsive fix for Inheritance page */
        @media (max-width: 900px) {
            #inh-layout {
                grid-template-columns: 1fr !important;
            }

            #inh-layout > div:last-child {
                position: static !important;
            }
        }
    </style>

<body>

<!-- ── Loading screen ─────────────────────────────────────────── -->
<div id="loading" role="status" aria-label="Loading IslamicHub">
    <div class="loading-inner">
        <div class="loading-ornament" aria-hidden="true">
            <div class="lo-gem"></div>
        </div>
        <div class="loading-bismillah" lang="ar" aria-label="Bismillah ir-Rahman ir-Raheem">
            بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيم
        </div>
        <div class="loading-logo" aria-hidden="true">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5">
                <polygon points="12,2 20,7 20,17 12,22 4,17 4,7"/>
                <polygon points="12,6 17,9 17,15 12,18 7,15 7,9"/>
            </svg>
        </div>
        <div class="loading-name">Islamic<span>Hub</span></div>
        <div class="loading-sub">In the name of Allah, the Most Gracious, the Most Merciful</div>
    </div>
</div>

<!-- ── Nav (injected by app.js) ───────────────────────────────── -->
<header id="site-nav" class="site-nav" role="banner"></header>

<!-- ── Page outlet (router renders here) ─────────────────────── -->
<main id="app" role="main" aria-live="polite" aria-atomic="false"></main>

<!-- ── Footer (injected by app.js) ───────────────────────────── -->
<footer id="site-footer" class="site-footer" role="contentinfo"></footer>

<!-- ── Bootstrap (type=module defers automatically) ──────────── -->
<script type="module">
    import {bootstrap} from './js/app.js';

    // We show the loader for a minimum of 2s so the Bismillah is readable,
    // but hide it as soon as the app is ready if fonts take longer.
    const START = Date.now();
    const MIN_MS = 2000;

    const hideLoading = () => {
        const wait = Math.max(0, MIN_MS - (Date.now() - START));
        setTimeout(() => {
            const el = document.getElementById('loading');
            if (el) {
                el.classList.add('hidden');
                setTimeout(() => el.remove(), 500);
            }
        }, wait);
    };

    try {
        bootstrap();
        // document.fonts.ready resolves once all fonts are loaded or timed-out
        (document.fonts ? document.fonts.ready : Promise.resolve()).then(hideLoading);
    } catch (err) {
        console.error('[IslamicHub] bootstrap error:', err);
        hideLoading();
    }
</script>

</body>
</html>
