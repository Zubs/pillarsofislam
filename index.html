<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IslamicHub — Learn &amp; Live the Five Pillars</title>
  <meta name="description" content="A comprehensive Islamic education and tools platform. Prayer times, Zakat calculator, Qibla finder, inheritance calculator, and in-depth guides for all Five Pillars — grounded in Qur'an, Hadith, and scholarly tradition.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">

  <!-- Styles — loaded in dependency order -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">

  <style>
    /* ── Loading screen ───────────────────────────── */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity .3s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .loading-inner { text-align: center; }
    .loading-logo {
      width: 56px; height: 56px;
      background: var(--green);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
      animation: loadPulse 1.5s ease-in-out infinite;
    }
    @keyframes loadPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
    .loading-name {
      font-family: var(--serif);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: .25rem;
    }
    .loading-name span { color: var(--green); }
    .loading-sub { font-size: 13px; color: var(--muted); }

    /* ── App shell ────────────────────────────────── */
    #app {
      min-height: calc(100vh - var(--nav-height));
      opacity: 1;
      transition: opacity .15s ease;
    }

    /* ── Responsive layout fixes ──────────────────── */
    @media (max-width: 900px) {
      #inh-layout { grid-template-columns: 1fr !important; }
      #inh-layout > div:last-child { position: static !important; }
    }
  </style>
</head>
<body>

  <!-- Loading screen -->
  <div id="loading">
    <div class="loading-inner">
      <div class="loading-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5">
          <polygon points="12,2 20,7 20,17 12,22 4,17 4,7"/>
          <polygon points="12,6 17,9 17,15 12,18 7,15 7,9"/>
        </svg>
      </div>
      <div class="loading-name">Islamic<span>Hub</span></div>
      <div class="loading-sub">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيم</div>
    </div>
  </div>

  <!-- Nav (built by app.js) -->
  <header id="site-nav" class="site-nav" role="banner"></header>

  <!-- Page content (router renders here) -->
  <main id="app" role="main"></main>

  <!-- Footer (built by app.js) -->
  <footer id="site-footer" class="site-footer" role="contentinfo"></footer>

  <!-- Bootstrap — ES module entry point -->
  <script type="module">
    import { bootstrap } from './js/app.js';

    // Dismiss loading screen once fonts + first render are ready
    const hideLoading = () => {
      const el = document.getElementById('loading');
      if (el) {
        el.classList.add('hidden');
        setTimeout(() => el.remove(), 400);
      }
    };

    // Bootstrap the app
    try {
      bootstrap();
      // Give fonts a moment to load then hide loader
      if (document.fonts) {
        document.fonts.ready.then(hideLoading);
      } else {
        setTimeout(hideLoading, 300);
      }
    } catch (err) {
      console.error('Bootstrap error:', err);
      hideLoading();
    }
  </script>

</body>
</html>
