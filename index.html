    <style>
        /* ── Loading screen ───────────────────────────── */
        #loading {
            position: fixed;
            inset: 0;
            background-color: var(--cream);
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%231B5C42'%3E%3Crect x='25' y='25' width='50' height='50' stroke-width='0.55' opacity='0.38' transform='rotate(45 50 50)'/%3E%3Crect x='25' y='25' width='50' height='50' stroke-width='0.55' opacity='0.22'/%3E%3Cline x1='50' y1='0' x2='50' y2='25' stroke-width='0.4' opacity='0.18'/%3E%3Cline x1='50' y1='75' x2='50' y2='100' stroke-width='0.4' opacity='0.18'/%3E%3Cline x1='0' y1='50' x2='25' y2='50' stroke-width='0.4' opacity='0.18'/%3E%3Cline x1='75' y1='50' x2='100' y2='50' stroke-width='0.4' opacity='0.18'/%3E%3C/g%3E%3Crect x='47.5' y='47.5' width='5' height='5' fill='none' stroke='%23C4932A' stroke-width='0.4' opacity='0.22' transform='rotate(45 50 50)'/%3E%3C/svg%3E");
            background-size: 100px 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity .4s ease;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-inner {
            text-align: center;
            padding: 0 2rem;
        }

        .loading-ornament {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: loadFadeUp .6s ease .05s both;
        }

        .loading-ornament::before,
        .loading-ornament::after {
            content: '';
            width: 48px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--gold));
        }

        .loading-ornament::after {
            background: linear-gradient(to left, transparent, var(--gold));
        }

        .loading-ornament-gem {
            width: 8px;
            height: 8px;
            background: var(--gold);
            transform: rotate(45deg);
        }

        .loading-bismillah {
            font-family: 'Amiri', serif;
            font-size: 2.4rem;
            color: var(--green);
            direction: rtl;
            line-height: 1.5;
            margin-bottom: 1.75rem;
            opacity: 0;
            animation: loadFadeUp .7s ease .15s both;
        }

        .loading-logo {
            width: 52px;
            height: 52px;
            background: var(--green);
            border-radius: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto .9rem;
            opacity: 0;
            animation: loadFadeUp .6s ease .35s both, loadPulse 12s linear .8s infinite;
        }

        .loading-name {
            font-family: 'Amiri', var(--serif);
            font-size: 1.9rem;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: .5px;
            margin-bottom: .2rem;
            opacity: 0;
            animation: loadFadeUp .6s ease .5s both;
        }

        .loading-name span {
            color: var(--green);
        }

        .loading-trans {
            font-family: var(--sans);
            font-size: 11.5px;
            color: var(--muted);
            letter-spacing: .5px;
            opacity: 0;
            animation: loadFadeUp .5s ease .65s both;
        }

        @keyframes loadFadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes loadPulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(27, 92, 66, 0)
            }
            50% {
                box-shadow: 0 0 0 8px rgba(27, 92, 66, .08)
            }
        }

        /* ── App shell ────────────────────────────────── */
        #app {
            min-height: calc(100vh - var(--nav-height));
            opacity: 1;
            transition: opacity .15s ease;
        }

        /* ── Responsive fixes ─────────────────────────── */
        @media (max-width: 900px) {
            #inh-layout {
                grid-template-columns: 1fr !important;
            }

            #inh-layout > div:last-child {
                position: static !important;
            }
        }
    </style>

<body>
<!-- Loading screen -->
<div id="loading" role="status" aria-label="Loading IslamicHub">
    <div class="loading-inner">
        <div class="loading-ornament" aria-hidden="true">

            الرَّحِيم
        </div>
        <div class="loading-logo" aria-hidden="true">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5"
                 aria-hidden="true">
                <polygon points="12,2 20,7 20,17 12,22 4,17 4,7"/>
                <polygon points="12,6 17,9 17,15 12,18 7,15 7,9"/>
            </svg>
        </div>
        <div class="loading-name">Islamic<span>Hub</span></div>
        <div class="loading-trans">In the name of Allah, the Most Gracious, the Most Merciful</div>
    </div>
</div>

<!-- Nav (injected by app.js) -->
<header id="site-nav" class="site-nav" role="banner"></header>

<!-- Page content (router renders here) -->
<main id="app" role="main" aria-live="polite" aria-atomic="false"></main>

<!-- Footer (injected by app.js) -->
<footer id="site-footer" class="site-footer" role="contentinfo"></footer>

<!-- Bootstrap -->
<script type="module">
    import {bootstrap} from './js/app.js';

    const MIN_SHOW = 2800;
    const startTime = Date.now();

    const hideLoading = () => {
        const elapsed = Date.now() - startTime;
        const remaining = Math.max(0, MIN_SHOW - elapsed);
        setTimeout(() => {
            const el = document.getElementById('loading');
            if (el) {
                el.classList.add('hidden');
                setTimeout(() => el.remove(), 400);
            }
        }, remaining);
    };

    try {
        bootstrap();
        if (document.fonts) {
            document.fonts.ready.then(hideLoading);
        } else {
            hideLoading();
        }
    } catch (err) {
        console.error('Bootstrap error:', err);
        hideLoading();
    }
</script>
</body>
