# netlify.toml — Netlify deployment configuration

[build]
publish = "."

# ── Security & SEO headers ────────────────────────────────────────────────────
[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "geolocation=(self), camera=(), microphone=()"
# Allow geolocation for prayer times / Qibla
Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.metals.live https://api.frankfurter.app https://nominatim.openstreetmap.org; img-src 'self' data:;"

# ── Long cache for versioned assets ──────────────────────────────────────────
[[headers]]
for = "/css/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/js/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.woff2"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# ── Short cache for HTML (so updates deploy fast) ─────────────────────────────
[[headers]]
for = "/*.html"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/index.html"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

# ── SPA redirect: all routes serve index.html ─────────────────────────────────
[[redirects]]
from = "/*"
to = "/index.html"
status = 200
